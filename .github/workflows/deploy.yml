name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    container: ghcr.io/freeshardbase/cicd-image:1.1.4
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build store data
        run: python3 build_store_data.py

      - name: Upload to Azure Blob Storage
        env:
          AZ_STORAGE_SAS_TOKEN: ${{ secrets.AZ_STORAGE_SAS_TOKEN }}
        run: |
          az storage blob upload-batch \
            --destination "app-store/master/all_apps" \
            --source apps \
            --sas-token $AZ_STORAGE_SAS_TOKEN \
            --account-name storageaccountportab0da \
            --overwrite
          az storage blob upload-batch \
            --destination "app-store/${{ github.ref_name }}/all_apps" \
            --source apps \
            --sas-token $AZ_STORAGE_SAS_TOKEN \
            --account-name storageaccountportab0da \
            --overwrite

  preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    container: ghcr.io/freeshardbase/cicd-image:1.1.4
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Build store data
        run: python3 build_store_data.py

      - name: Upload preview to Azure Blob Storage
        env:
          AZ_STORAGE_SAS_TOKEN: ${{ secrets.AZ_STORAGE_SAS_TOKEN }}
        run: |
          az storage blob upload-batch \
            --destination "app-store/preview/${{ github.head_ref }}/all_apps" \
            --source apps \
            --sas-token $AZ_STORAGE_SAS_TOKEN \
            --account-name storageaccountportab0da \
            --overwrite

      - name: Build updated_apps.zip bundle (changed apps only)
        if: startsWith(github.head_ref, 'updates/')
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          mkdir -p /tmp/bundle
          # find apps changed in this PR
          git fetch origin main
          changed=$(git diff --name-only origin/main...HEAD -- 'apps/' \
                    | awk -F/ '{print $2}' | sort -u)
          echo "Changed apps:"; echo "$changed"
          for app in $changed; do
            if [ -f "apps/$app/$app.zip" ]; then
              cp "apps/$app/$app.zip" /tmp/bundle/
            fi
          done
          (cd /tmp/bundle && zip -r /tmp/updated_apps.zip .)
          ls -la /tmp/updated_apps.zip

      - name: Upload updated_apps.zip bundle
        if: startsWith(github.head_ref, 'updates/')
        env:
          AZ_STORAGE_SAS_TOKEN: ${{ secrets.AZ_STORAGE_SAS_TOKEN }}
        run: |
          # head_ref is `updates/<iso-ts>`; strip the prefix
          TS="${GITHUB_HEAD_REF#updates/}"
          echo "Uploading to app-store/updates/$TS/updated_apps.zip"
          az storage blob upload \
            --file /tmp/updated_apps.zip \
            --container-name app-store \
            --name "updates/$TS/updated_apps.zip" \
            --sas-token "$AZ_STORAGE_SAS_TOKEN" \
            --account-name storageaccountportab0da \
            --overwrite
